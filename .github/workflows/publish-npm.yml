name: Publish NPM

on:
  workflow_dispatch:

concurrency:
  group: publish-npm
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Require version tag
        run: |
          if [[ "${GITHUB_REF}" != refs/tags/v* ]]; then
            echo "Publish must be dispatched at a v* tag, received ${GITHUB_REF}" >&2
            exit 1
          fi
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Verify tag and ancestry
        run: |
          PACKAGE_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")
          test "v${PACKAGE_VERSION}" = "${GITHUB_REF_NAME}"
          git fetch origin main
          git merge-base --is-ancestor "${GITHUB_SHA}" "FETCH_HEAD"

  verify:
    needs: preflight
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22', '24']
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci --ignore-scripts --no-fund --no-audit
      - name: Install browser verification runtime
        run: npx playwright install --with-deps chromium
      - name: Run portable release verification
        env:
          FIELDWORK_VISUAL_SNAPSHOTS: '0'
        run: npm run verify:static

  package:
    needs: [preflight, verify]
    runs-on: ubuntu-latest
    outputs:
      filename: ${{ steps.pack.outputs.filename }}
      sha512: ${{ steps.pack.outputs.sha512 }}
      package_name: ${{ steps.pack.outputs.package_name }}
      package_version: ${{ steps.pack.outputs.package_version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24'
      - run: npm ci --ignore-scripts --no-fund --no-audit
      - run: npm run build
      - name: Build exact package artifact
        id: pack
        run: |
          PACKAGE_DIR="${RUNNER_TEMP}/fieldwork-package"
          mkdir -p "${PACKAGE_DIR}"
          FILENAME=$(npm pack --pack-destination "${PACKAGE_DIR}" --json | node -e 'let d=""; process.stdin.on("data",c=>d+=c).on("end",()=>console.log(JSON.parse(d)[0].filename))')
          SHA512=$(shasum -a 512 "${PACKAGE_DIR}/${FILENAME}" | awk '{print $1}')
          PACKAGE_NAME=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).name")
          PACKAGE_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")
          echo "filename=${FILENAME}" >> "${GITHUB_OUTPUT}"
          echo "sha512=${SHA512}" >> "${GITHUB_OUTPUT}"
          echo "package_name=${PACKAGE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "package_version=${PACKAGE_VERSION}" >> "${GITHUB_OUTPUT}"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fieldwork-package-${{ github.ref_name }}
          path: ${{ runner.temp }}/fieldwork-package/${{ steps.pack.outputs.filename }}
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  publish:
    needs: [preflight, verify, package]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check published version
        id: published
        env:
          PACKAGE_NAME: ${{ needs.package.outputs.package_name }}
          PACKAGE_VERSION: ${{ needs.package.outputs.package_version }}
        run: |
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "${GITHUB_OUTPUT}"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping."
          else
            echo "published=false" >> "${GITHUB_OUTPUT}"
          fi
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        if: steps.published.outputs.published != 'true'
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        if: steps.published.outputs.published != 'true'
        with:
          name: fieldwork-package-${{ github.ref_name }}
          path: ${{ runner.temp }}/fieldwork-package
      - name: Verify artifact digest
        if: steps.published.outputs.published != 'true'
        env:
          EXPECTED_SHA512: ${{ needs.package.outputs.sha512 }}
          PACKAGE_FILENAME: ${{ needs.package.outputs.filename }}
        run: |
          ACTUAL_SHA512=$(shasum -a 512 "${RUNNER_TEMP}/fieldwork-package/${PACKAGE_FILENAME}" | awk '{print $1}')
          test "${ACTUAL_SHA512}" = "${EXPECTED_SHA512}"
      - name: Publish with provenance
        if: steps.published.outputs.published != 'true'
        env:
          PACKAGE_FILENAME: ${{ needs.package.outputs.filename }}
        run: npm publish "${RUNNER_TEMP}/fieldwork-package/${PACKAGE_FILENAME}" --access public --provenance --ignore-scripts
